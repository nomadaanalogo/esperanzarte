<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flor Navideña – Esperanzarte Manualidades</title>
  <link rel="icon" type="image/png" href="../images/logo.webp" />

  <meta property="og:title" content="Tutorial paso a paso flor navideña GRATIS 🌸" />
  <meta property="og:description" content="Para ver solo toca el link 👇" />
  <meta property="og:image" content="https://esperanzartemanualidades.com/images/floryoutube.webp" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet" />

  <style>
    body { background: var(--cream); }

    .unlock-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      gap: 1.25rem;
    }

    .logo-top {
      position: fixed;
      top: 1rem;
      left: 1rem;
    }
    .logo-top img { height: 36px; }

    .unlock-wrap h1 {
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      color: var(--ink);
      line-height: 1.35;
      max-width: 460px;
      margin: 0;
    }

    .unlock-wrap p {
      font-size: 0.9rem;
      color: var(--muted-fg);
      max-width: 400px;
      margin: 0;
    }

    /* Portada con candado */
    .portada-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 16/9;
      border-radius: 0.75rem;
      overflow: hidden;
      cursor: pointer;
    }

    .portada-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: bottom;
      display: block;
      filter: brightness(0.55);
    }

    .candado {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #fff;
    }

    .candado svg {
      width: 3rem; height: 3rem;
      fill: #fff;
      opacity: 0.9;
    }

    .candado span {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* Botón compartir */
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #000000;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem 1.75rem;
      border-radius: 2rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .share-btn svg { width: 1.3rem; height: 1.3rem; fill: #fff; flex-shrink: 0; }

    /* Video */
    .video-wrap {
      display: none;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16/9;
    }

    .video-wrap iframe {
      width: 100%; height: 100%;
      border: none;
      border-radius: 0.75rem;
    }

    .video-wrap.visible { display: block; }
  </style>
</head>
<body>


  <div class="unlock-wrap">

    <h1>Comparte este video <br> con 3 amig@s para poder verlo</h1>
   
      <p>El video se abre automáticamente 🎁 después de compartir</p>

    <!-- Portada bloqueada -->
    <div id="bloqueo">
      <div class="portada-wrap">
        <img src="../images/floryoutube.webp" alt="Flor Navideña" />
        <div class="candado">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/></svg>
          <span id="candado-txt">Comparte para desbloquear</span>
        </div>
      </div>
<br>
      <button class="share-btn" onclick="compartir()">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.852L.057 23.667a.5.5 0 0 0 .614.63l5.905-1.553A11.954 11.954 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.969 9.969 0 0 1-5.071-1.381l-.361-.214-3.745.985.984-3.657-.236-.376A9.97 9.97 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        <span id="btn-txt">Compartir (0 de 3)</span>
      </button>
    </div>

    <!-- Video desbloqueado -->
    <div id="video-wrap" class="video-wrap">
      <iframe
        src="https://www.youtube-nocookie.com/embed/i8Qkr40igHM?rel=0"
        title="Flor Navideña – Esperanzarte Manualidades"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>

  </div>

  <script>
    const KEY       = 'flornavidena_count';
    const TOTAL     = 3;
    let count       = parseInt(localStorage.getItem(KEY) || '0');

    function actualizar() {
      document.getElementById('btn-txt').textContent = 'Compartir (' + count + ' de ' + TOTAL + ')';
      if (count >= TOTAL) desbloquear();
    }

    function desbloquear() {
      localStorage.setItem(KEY, TOTAL);
      document.getElementById('bloqueo').style.display = 'none';
      document.getElementById('video-wrap').classList.add('visible');
    }

    async function compartir() {
      const datos = {
        title: 'Tutorial flor navideña GRATIS 🌸',
        text: '¡Mira este tutorial paso a paso, te va a encantar!',
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(datos);
          count = Math.min(count + 1, TOTAL);
          localStorage.setItem(KEY, count);
          actualizar();
        } catch (e) {
          // canceló — no cuenta
        }
      } else {
        // Fallback escritorio
        const url = encodeURIComponent(window.location.href);
        const texto = encodeURIComponent('¡Mira este tutorial paso a paso, te va a encantar! 🌸 Toca el enlace 👉');
        window.open('https://wa.me/?text=' + texto + url, '_blank');
        count = Math.min(count + 1, TOTAL);
        localStorage.setItem(KEY, count);
        actualizar();
      }
    }

    actualizar();
  </script>

</body>
</html>
